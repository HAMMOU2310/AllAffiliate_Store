<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natural Health & Fitness Magazine</title>

    <meta property="og:title" content="Natural Health & Fitness Magazine - Science-Backed Solutions">
    <meta property="og:description" content="Discover science-backed natural solutions, weight loss tips, and fitness advice for sustainable health.">
    <meta property="og:type" content="website">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .gradient-text {
            background: linear-gradient(to right, #16a34a, #059669);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-white shadow-sm py-6 border-b border-gray-100">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <h1 class="text-3xl font-bold gradient-text">Natural Health & Fitness Magazine</h1>
            <p class="text-gray-500 text-sm mt-2">Discover science-backed natural solutions, weight loss tips, and proven remedies</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <div id="products-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <footer class="bg-white border-t border-gray-100 py-6 mt-12 text-center text-gray-400 text-xs">
        <p>&copy; 2026 Natural Health & Fitness Magazine. All rights reserved.</p>
    </footer>

    <script>
        async function fetchProducts() {
            try {
                const response = await fetch('data/products.json');
                const products = await response.json();
                const container = document.getElementById('products-container');
                container.innerHTML = '';
                
                products.forEach(product => {
                    const card = document.createElement('div');
                    card.className = "bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col hover:shadow-md transition duration-300";
                    
                    // تحضير رابط بنترست الذكي بالبيانات الجديدة الإنجليزية
                    const pinUrl = `https://www.pinterest.com/pin/create/button/?url=${encodeURIComponent(window.location.href)}&media=${encodeURIComponent(product.image_url)}&description=${encodeURIComponent(product.title + ' - ' + product.description)}`;

                    card.innerHTML = `
                        <div class="relative">
                            <img src="${product.image_url}" alt="${product.title}" class="w-full h-56 object-cover">
                            <a href="${pinUrl}" target="_blank" class="absolute top-3 right-3 bg-[#e60023] hover:bg-[#b6001a] text-white p-2 rounded-full shadow-lg transition flex items-center justify-center" title="Pin to Pinterest">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.08 3.16 9.42 7.63 11.16-.1-.95-.2-2.4.04-3.43.22-.93 1.4-5.93 1.4-5.93s-.36-.71-.36-1.77c0-1.66.96-2.9 2.17-2.9 1.02 0 1.51.77 1.51 1.69 0 1.03-.65 2.56-.99 3.99-.28 1.19.6 2.16 1.77 2.16 2.12 0 3.76-2.24 3.76-5.48 0-2.87-2.06-4.87-5-4.87-3.4 0-5.4 2.56-5.4 5.19 0 1.03.4 2.14.9 2.74.1.12.11.23.08.35-.09.37-.29 1.18-.33 1.34-.05.22-.18.27-.41.16-1.53-.71-2.48-2.94-2.48-4.73 0-3.85 2.8-7.39 8.07-7.39 4.24 0 7.53 3.02 7.53 7.06 0 4.21-2.65 7.6-6.33 7.6-1.24 0-2.4-.64-2.8-1.4 0 0-.61 2.33-.76 2.9-.27 1.05-1.02 2.37-1.52 3.19 1.12.35 2.3.54 3.52.54 6.63 0 12-5.37 12-12S18.63 0 12 0z"/></svg>
                            </a>
                        </div>
                        <div class="p-6 flex flex-col flex-grow">
                            <h2 class="text-xl font-bold text-gray-900 mb-2">${product.title}</h2>
                            <p class="text-gray-600 text-sm leading-relaxed mb-6 flex-grow">${product.description}</p>
                            <a href="${product.affiliate_link}" target="_blank" rel="noopener noreferrer" 
                               class="block w-full text-center bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-4 rounded-xl transition text-sm shadow-sm">
                                Check Availability & Best Discount
                            </a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Error fetching products:", error);
            }
        }
        fetchProducts();
    </script>
</body>
</html>
