<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجلة الصحة والرشاقة الطبيعية | بوابتك لأفضل المنتجات</title>

    <meta property="og:title" content="دليلك الصحي الحصري - أفضل حلول الرشاقة المعتمدة">
    <meta property="og:description" content="اكتشف المنتجات الصحية الأكثر طلباً وعالمية، مراجعات دقيقة وروابط مباشرة آمنة 100%.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://images.unsplash.com/photo-1490645935967-10de6ba17061?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80"> 
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .gradient-text {
            background: linear-gradient(to right, #16a34a, #059669);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-slate-50 text-gray-800">

    <header class="bg-white shadow-sm py-8 border-b border-gray-100">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <h1 class="text-4xl font-extrabold gradient-text mb-3">مجلة الصحة والرشاقة الطبيعية</h1>
            <p class="text-gray-500 font-medium">ترشيحات حصرية مبنية على تجارب حقيقية وموثوقة</p>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-12">
        <div id="products-container" class="grid gap-8 md:grid-cols-2 lg:grid-cols-3">
            <div id="loading" class="text-center col-span-full py-20">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-4 border-green-600 border-opacity-50"></div>
                <p class="mt-4 text-gray-500 font-medium">جاري تحميل أحدث المنتجات المعتمدة...</p>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-8 text-center text-sm text-gray-400 mt-10">
        <p>جميع الحقوق محفوظة © مجلة الصحة والرشاقة الطبيعية 2026</p>
        <p class="mt-2 text-xs">إخلاء مسؤولية: يحتوي هذا الموقع على روابط عمولة (Affiliate Links).</p>
    </footer>

    <script>
        // دالة لجلب البيانات من قاعدة البيانات المحلية JSON
        async function fetchProducts() {
            const container = document.getElementById('products-container');
            const loading = document.getElementById('loading');

            try {
                // نطلب ملف الـ JSON الذي يقوم وكيل البايثون بتحديثه
                const response = await fetch('data/products.json');
                
                if (!response.ok) {
                    throw new Error("لا يمكن العثور على ملف المنتجات.");
                }

                const data = await response.json();
                loading.remove();

                // التحقق من وجود منتجات
                if (!data || data.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-20 bg-white rounded-2xl shadow-sm border border-gray-100">
                            <span class="text-4xl block mb-4">⏳</span>
                            <h3 class="text-xl font-bold text-gray-700 mb-2">انتظرونا!</h3>
                            <p class="text-gray-500">سيتم نشر التحديثات والمنتجات الجديدة قريباً جداً.</p>
                        </div>
                    `;
                    return;
                }

                // عرض المنتجات (تفترض مصفوفة المنتجات أنها مرتبة مسبقاً من الأحدث للأقدم بواسطة البايثون)
                data.forEach(product => {
                    const card = document.createElement('div');
                    card.className = "bg-white rounded-2xl shadow-sm hover:shadow-xl transition-shadow duration-300 overflow-hidden border border-gray-100 flex flex-col group";
                    
                    // توليد رابط المشاركة على Pinterest
                    const currentUrl = encodeURIComponent(window.location.href);
                    const pinterestShareUrl = `https://pinterest.com/pin/create/button/?url=${currentUrl}&media=${encodeURIComponent(product.image_url || product.image)}&description=${encodeURIComponent(product.title + " - " + product.description)}`;

                    card.innerHTML = `
                        <div class="relative overflow-hidden h-64">
                            <img src="${product.image_url || product.image}" alt="${product.title}" class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-500">
                        </div>
                        <div class="p-6 flex flex-col flex-grow">
                            <h2 class="text-xl font-bold text-gray-900 mb-3 line-clamp-2">${product.title}</h2>
                            <p class="text-gray-600 text-sm leading-relaxed mb-6 flex-grow">${product.description}</p>
                            
                            <div class="flex flex-col gap-3 mt-auto">
                                <a href="${product.link || product.affiliate_link}" target="_blank" rel="noopener noreferrer" 
                                   class="block w-full text-center bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-xl transition-colors shadow-sm">
                                   🛒 التحقق من التوفر والخصم 
                                </a>
                                
                                <a href="${pinterestShareUrl}" target="_blank" rel="noopener noreferrer"
                                   class="block w-full text-center bg-[#E60023] hover:bg-[#ad081b] text-white font-bold py-2 px-4 rounded-xl transition-colors shadow-sm text-sm flex items-center justify-center gap-2">
                                   <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M12.017 0C5.396 0 .029 5.367.029 11.987c0 5.079 3.158 9.417 7.618 11.162-.105-.949-.199-2.403.041-3.439.219-.937 1.406-5.957 1.406-5.957s-.359-.72-.359-1.781c0-1.663.967-2.911 2.168-2.911 1.024 0 1.518.769 1.518 1.688 0 1.029-.653 2.567-.992 3.992-.285 1.193.6 2.165 1.775 2.165 2.128 0 3.768-2.245 3.768-5.487 0-2.861-2.063-4.869-5.008-4.869-3.41 0-5.409 2.562-5.409 5.199 0 1.033.394 2.143.889 2.741.099.12.112.225.085.345-.09.375-.293 1.199-.334 1.363-.053.225-.172.271-.401.165-1.495-.69-2.433-2.878-2.433-4.646 0-3.776 2.748-7.252 7.951-7.252 4.168 0 7.392 2.967 7.392 6.923 0 4.135-2.607 7.462-6.233 7.462-1.214 0-2.354-.629-2.758-1.379l-.749 2.848c-.269 1.045-1.004 2.352-1.498 3.146 1.123.345 2.306.535 3.55.535 6.607 0 11.985-5.365 11.985-11.987C23.97 5.367 18.633 0 12.017 0z"/></svg>
                                   أنشئ دبوس (Pin) فوراً
                                </a>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("خطأ في جلب المنتجات:", error);
                loading.innerHTML = `<p class="text-red-500 font-medium">عذراً، حدث خطأ أثناء تحميل المنتجات. يرجى تحديث الصفحة.</p>`;
            }
        }

        // تشغيل الدالة عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', fetchProducts);
    </script>
</body>
</html>
